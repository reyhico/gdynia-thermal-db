version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"
  rich:
    format: "%(message)s"
    datefmt: "[%X]"

handlers:
  console:
    class: rich.logging.RichHandler
    formatter: rich
    level: INFO
    rich_tracebacks: true

  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    filename: outputs/logs/gdynia_thermal_db.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    level: DEBUG

root:
  level: DEBUG
  handlers: [console, file]

loggers:
  gdynia_thermal_db:
    level: DEBUG
    propagate: true
  httpx:
    level: WARNING
  urllib3:
    level: WARNING
